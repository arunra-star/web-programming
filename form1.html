
<html>
<head>
    <title>Form Creation</title>
</head>
<body>
    <h2>Registration Form</h2>

    <form onsubmit="return alert_msg()">
        Name: <input type="text" id="name"><br><br>

	Gender:<input type="radio" name="gender" value="male"> Male
	       <input type="radio" name="gender" value="female"> Female <br><br>

        E-mail: <input type="text" id="email"><br><br>

        Mobile Number: <input type="text" id="phone_number"><br><br>

        Password: <input type="password" id="password"><br><br>

        <input type="submit" value="Register">
    </form>

    <p id="demo"> Welcome </p>
    <button onclick="changeText()"> Change Text </button><br><br>

    <script>
        function alert_msg() 
	{

            if (document.getElementById("name").value == "")
	    {
                alert("Please enter your name");
                return false;
            }

            let em = document.getElementById("email").value;
            let emailpattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if (em == "" || !em.match(emailpattern))
	    {
                alert("Please enter a valid email");
                return false;
            }

            let mobile = document.getElementById("phone_number").value;
            let mobilepattern = /^(?:\+91|91|0)?[6-9]\d{9}$/;

            if (mobile == "" || !mobile.match(mobilepattern)) 
	    {
                alert("Enter a valid mobile number");
                return false;
            } 
	    let pass=document.getElementById("password").value;

            if ( pass=="" || pass.length!=6) 
	    {
                alert("Please enter your valid password");
                return false;
            }

            alert("You have entered all the details");
            return true;
        }

	function changeText()
	{
	   document.getElementById("demo").style.color="red";
	   document.getElementById("demo").style.fontSize="30px";
	   document.getElementById("demo").innerHTML="Welcome to Computer Technology";
	}
    </script>
</body>
</html>
