<html>
   <head>
      <h1>Welcome To JavaScript.</h1>
   </head>
   <body>
      <p> In This Example x,y are the Varibles.</p>

      <p id="demo1"></p>
      <p id="demo2"></p>
      <p id="demo3"></p>
      <p id="demo4"></p>
      <p id="demo5"></p>

      <script>
	document.writeln("Hello,world!");

	let x=10;
	let y=100;

	let a= x+y;
	let b= x-y;
	let c= x*y;
	let d= x/y;
	let e= x%y;

	document.getElementById("demo1").innerHTML="The Value of a is " + a;
	document.getElementById("demo2").innerHTML="The Value of b is " + b;
	document.getElementById("demo3").innerHTML="The Value of c is " + c;
	document.getElementById("demo4").innerHTML="The Value of d is " + d;
	document.getElementById("demo5").innerHTML="The Value of e is " + e;
      </script>
        </body>
</html>
